<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Flappy Bird Aula - Web (Velocidade Ajustada)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #70c5ce; /* Cor de fundo caso a imagem demore a carregar */
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * CONFIGURAÇÕES GERAIS
 */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 600;

// Variáveis de controle de tempo (FPS)
let fps = 30; // VELOCIDADE DO JOGO AQUI (Aumente para 60 se quiser mais liso)
let agora;
let depois = Date.now();
let intervalo = 1000 / fps;
let delta;

// Assets
const imgs = {};
const nomesImagens = ['bg', 'base', 'pipe', 'bird1', 'bird2', 'bird3'];
let imagensCarregadas = 0;

// Variáveis Globais do Jogo
let passaro, canos, pontos, rodando, chaoX, teclaDireita;

/**
 * CARREGAMENTO DE IMAGENS
 */
function carregarImagens() {
    nomesImagens.forEach(nome => {
        imgs[nome] = new Image();
        imgs[nome].src = `imgs/${nome}.png`;
        imgs[nome].onload = () => {
            imagensCarregadas++;
            if (imagensCarregadas === nomesImagens.length) {
                setup(); // Inicia o jogo quando todas as imagens carregarem
            }
        };
        imgs[nome].onerror = () => {
            console.error(`Erro ao carregar a imagem: ${nome}.png na pasta imgs/`);
        };
    });
}

/**
 * CLASSE PÁSSARO
 */
class Passaro {
    constructor() {
        this.x = 70;
        this.y = 300;
        this.velocidade = 0;
        this.angulo = 0;
        this.tempo = 0;
        this.contagemAnimacao = 0;
    }

    pular() {
        this.velocidade = -8; // Força do pulo
        this.tempo = 0;
    }

    mover(estabilizado) {
        if (estabilizado) {
            this.velocidade = 0;
            this.angulo = 0;
            this.tempo = 0;
        } else {
            this.tempo++;
            // Gravidade simulada
            let deslocamento = 0.6 * (this.tempo) + this.velocidade;
            
            if (deslocamento > 12) deslocamento = 12; // Velocidade máxima de queda
            this.y += deslocamento;

            // Rotação
            if (deslocamento < 0) {
                this.angulo = -25;
            } else {
                this.angulo = Math.min(this.angulo + 3, 70);
            }
        }
    }

    desenhar() {
        this.contagemAnimacao++;
        let imgPassaro;
        // Alterna entre bird1, bird2 e bird3 para animar as asas
        if (this.contagemAnimacao % 12 < 4) imgPassaro = imgs.bird1;
        else if (this.contagemAnimacao % 12 < 8) imgPassaro = imgs.bird2;
        else imgPassaro = imgs.bird3;

        ctx.save();
        ctx.translate(this.x + 20, this.y + 15);
        ctx.rotate(this.angulo * Math.PI / 180);
        ctx.drawImage(imgPassaro, -22, -16, 45, 32);
        ctx.restore();
    }
}

/**
 * CLASSE CANO
 */
class Cano {
    constructor(x) {
        this.x = x;
        this.largura = 80;
        this.distancia = 180; // Espaço entre os canos
        this.velocidade = 4;   // Velocidade horizontal (ajuste aqui)
        this.passou = false;
        this.alturaTopo = Math.random() * (350 - 100) + 100;
    }

    mover() {
        this.x -= this.velocidade;
    }

    desenhar() {
        // Cano de cima
        ctx.save();
        ctx.translate(this.x + this.largura, this.alturaTopo);
        ctx.rotate(Math.PI);
        ctx.drawImage(imgs.pipe, 0, 0, this.largura, 600);
        ctx.restore();

        // Cano de baixo
        ctx.drawImage(imgs.pipe, this.x, this.alturaTopo + this.distancia, this.largura, 600);
    }

    colidir(p) {
        // Colisão simplificada por retângulo (Hitbox)
        if (p.x + 35 > this.x && p.x < this.x + this.largura) {
            if (p.y < this.alturaTopo || p.y + 25 > this.alturaTopo + this.distancia) {
                return true;
            }
        }
        return false;
    }
}

/**
 * LÓGICA PRINCIPAL
 */
function setup() {
    passaro = new Passaro();
    canos = [new Cano(900)];
    pontos = 0;
    chaoX = 0;
    rodando = true;
    teclaDireita = false;
    loop();
}

function loop() {
    // ESTA É A PARTE QUE CONTROLA A VELOCIDADE
    requestAnimationFrame(loop);

    agora = Date.now();
    delta = agora - depois;

    if (delta > intervalo) {
        depois = agora - (delta % intervalo);

        if (!rodando) return;

        // 1. Mover Pássaro
        passaro.mover(teclaDireita);
        
        // 2. Gerar Novos Canos
        if (canos[canos.length - 1].x < 500) {
            canos.push(new Cano(850));
        }

        // 3. Mover e Checar Canos
        canos.forEach((cano, index) => {
            cano.mover();
            
            // Checar Colisão
            if (cano.colidir(passaro)) {
                reiniciar();
            }

            // Marcar Ponto
            if (!cano.passou && passaro.x > cano.x) {
                cano.passou = true;
                pontos++;
            }

            // Remover canos que saíram da tela
            if (cano.x < -100) canos.splice(index, 1);
        });

        // 4. Checar Chão e Teto
        if (passaro.y > 530 || passaro.y < -50) {
            reiniciar();
        }

        // 5. Mover Chão Infinito
        chaoX = (chaoX - 4) % canvas.width;

        // 6. Desenhar tudo
        desenhar();
    }
}

function desenhar() {
    // Limpar fundo
    ctx.drawImage(imgs.bg, 0, 0, canvas.width, canvas.height);

    // Canos
    canos.forEach(cano => cano.desenhar());

    // Chão (duas imagens para o efeito infinito)
    ctx.drawImage(imgs.base, chaoX, 530, canvas.width, 70);
    ctx.drawImage(imgs.base, chaoX + canvas.width, 530, canvas.width, 70);

    // Pássaro
    passaro.desenhar();

    // Placar
    ctx.fillStyle = "white";
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.font = "bold 40px Arial";
    ctx.fillText(`Pontos: ${pontos}`, canvas.width - 220, 50);
    ctx.strokeText(`Pontos: ${pontos}`, canvas.width - 220, 50);
}

function reiniciar() {
    rodando = false;
    // Pequeno atraso para o aluno ver que morreu (igual ao Pygame)
    setTimeout(setup, 1000);
}

/**
 * ENTRADA DO USUÁRIO
 */
window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
        passaro.pular();
        e.preventDefault(); // Evita que a barra de espaço role a página
    }
    if (e.code === "ArrowRight") teclaDireita = true;
});

window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowRight") teclaDireita = false;
});

// Suporte a clique do mouse / toque na tela (opcional)
canvas.addEventListener("mousedown", () => {
    if (rodando) passaro.pular();
});

// Iniciar o processo de carregamento
carregarImagens();

</script>
</body>
</html>
