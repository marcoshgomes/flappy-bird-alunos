<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- A linha abaixo impede que o navegador dê zoom ao clicar repetidamente no tablet -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Aula - Versão Dinâmica</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            /* Impede seleção de texto e comportamentos de toque padrão */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            border: 2px solid #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #70c5ce;
            /* Garante que o toque no canvas não arraste a tela */
            touch-action: none;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 600;

// --- VARIÁVEIS DE VELOCIDADE DINÂMICA ---
let fpsBase = 30; 
let fpsAtual = 30;
let velocidadeCanoBase = 4;
let velocidadeAtual = 4; // Essa velocidade vai aumentar
let agora;
let depois = Date.now();
let intervalo = 1000 / fpsAtual;
let delta;

const imgs = {};
const nomesImagens = ['bg', 'base', 'pipe', 'bird1', 'bird2', 'bird3'];
let imagensCarregadas = 0;

let passaro, canos, pontos, rodando, chaoX, teclaDireita;

function carregarImagens() {
    nomesImagens.forEach(nome => {
        imgs[nome] = new Image();
        imgs[nome].src = `imgs/${nome}.png`;
        imgs[nome].onload = () => {
            imagensCarregadas++;
            if (imagensCarregadas === nomesImagens.length) setup();
        };
    });
}

class Passaro {
    constructor() {
        this.x = 70;
        this.y = 300;
        this.velocidade = 0;
        this.angulo = 0;
        this.tempo = 0;
        this.contagemAnimacao = 0;
    }

    pular() {
        this.velocidade = -8;
        this.tempo = 0;
    }

    mover(estabilizado) {
        if (estabilizado) {
            this.velocidade = 0;
            this.angulo = 0;
            this.tempo = 0;
        } else {
            this.tempo++;
            // A gravidade também aumenta levemente com a velocidade para o jogo não ficar "bobo"
            let gravidadeAjustada = 0.6 + (velocidadeAtual - 4) * 0.05;
            let deslocamento = gravidadeAjustada * (this.tempo) + this.velocidade;
            
            if (deslocamento > 12) deslocamento = 12;
            this.y += deslocamento;

            if (deslocamento < 0) this.angulo = -25;
            else this.angulo = Math.min(this.angulo + 3, 70);
        }
    }

    desenhar() {
        this.contagemAnimacao++;
        let imgPassaro;
        if (this.contagemAnimacao % 12 < 4) imgPassaro = imgs.bird1;
        else if (this.contagemAnimacao % 12 < 8) imgPassaro = imgs.bird2;
        else imgPassaro = imgs.bird3;

        ctx.save();
        ctx.translate(this.x + 20, this.y + 15);
        ctx.rotate(this.angulo * Math.PI / 180);
        ctx.drawImage(imgPassaro, -22, -16, 45, 32);
        ctx.restore();
    }
}

class Cano {
    constructor(x) {
        this.x = x;
        this.largura = 80;
        this.distancia = 180;
        this.passou = false;
        this.alturaTopo = Math.random() * (350 - 100) + 100;
    }

    mover() {
        // Usa a velocidade atual que aumenta com o tempo
        this.x -= velocidadeAtual;
    }

    desenhar() {
        ctx.save();
        ctx.translate(this.x + this.largura, this.alturaTopo);
        ctx.rotate(Math.PI);
        ctx.drawImage(imgs.pipe, 0, 0, this.largura, 600);
        ctx.restore();
        ctx.drawImage(imgs.pipe, this.x, this.alturaTopo + this.distancia, this.largura, 600);
    }

    colidir(p) {
        if (p.x + 30 > this.x && p.x < this.x + this.largura) {
            if (p.y < this.alturaTopo || p.y + 22 > this.alturaTopo + this.distancia) {
                return true;
            }
        }
        return false;
    }
}

function setup() {
    passaro = new Passaro();
    canos = [new Cano(900)];
    pontos = 0;
    chaoX = 0;
    velocidadeAtual = velocidadeCanoBase; // Reseta a velocidade ao iniciar
    rodando = true;
    teclaDireita = false;
    loop();
}

function loop() {
    requestAnimationFrame(loop);
    agora = Date.now();
    delta = agora - depois;

    if (delta > intervalo) {
        depois = agora - (delta % intervalo);
        if (!rodando) return;

        passaro.mover(teclaDireita);
        
        // Gerar canos - a distância de spawn diminui conforme corre para não encavalar
        let spawnCheck = 500 - (velocidadeAtual * 10); 
        if (canos[canos.length - 1].x < (spawnCheck < 300 ? 300 : spawnCheck)) {
            canos.push(new Cano(850));
        }

        canos.forEach((cano, index) => {
            cano.mover();
            if (cano.colidir(passaro)) reiniciar();

            if (!cano.passou && passaro.x > cano.x) {
                cano.passou = true;
                pontos++;
                
                // --- LÓGICA DE ACELERAÇÃO (A cada 5 pontos) ---
                if (pontos > 0 && pontos % 5 === 0) {
                    velocidadeAtual += 0.6; // Aumenta a velocidade horizontal
                    console.log("Velocidade aumentada para: " + velocidadeAtual);
                }
            }
            if (cano.x < -100) canos.splice(index, 1);
        });

        if (passaro.y > 530 || passaro.y < -50) reiniciar();

        chaoX = (chaoX - velocidadeAtual) % canvas.width;
        desenhar();
    }
}

function desenhar() {
    ctx.drawImage(imgs.bg, 0, 0, canvas.width, canvas.height);
    canos.forEach(cano => cano.desenhar());
    ctx.drawImage(imgs.base, chaoX, 530, canvas.width, 70);
    ctx.drawImage(imgs.base, chaoX + canvas.width, 530, canvas.width, 70);
    passaro.desenhar();

    ctx.fillStyle = "white";
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.font = "bold 40px Arial";
    ctx.fillText(`Pontos: ${pontos}`, canvas.width - 220, 50);
    ctx.strokeText(`Pontos: ${pontos}`, canvas.width - 220, 50);
    
    // Feedback visual da velocidade para os alunos
    if (velocidadeAtual > velocidadeCanoBase) {
        ctx.font = "bold 15px Arial";
        ctx.fillText("VELOCIDADE AUMENTADA!", 20, 30);
    }
}

function reiniciar() {
    rodando = false;
    setTimeout(setup, 1000);
}

/** 
 * AJUSTE PARA TABLET E CONTROLES
 */
// Função única para pular usada por mouse, teclado e toque
function acaoPular(e) {
    if (e) e.preventDefault(); // IMPORTANTE: Impede o zoom e scroll no tablet
    if (rodando) passaro.pular();
}

// Evento de Toque (Tablet/Celular)
window.addEventListener("touchstart", acaoPular, { passive: false });

// Evento de Teclado
window.addEventListener("keydown", (e) => {
    if (e.code === "Space") acaoPular(e);
    if (e.code === "ArrowRight") teclaDireita = true;
});
window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowRight") teclaDireita = false;
});

// Evento de Clique do Mouse
canvas.addEventListener("mousedown", (e) => {
    if (e.button === 0) acaoPular(e);
});

carregarImagens();
</script>
</body>
</html>
