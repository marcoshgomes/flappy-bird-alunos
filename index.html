<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag crucial para dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Bird Pro - Responsivo</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Remove o brilho azul ao tocar no celular */
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #111; /* Fundo escuro para destacar o jogo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            user-select: none;
        }

        /* O segredo da responsividade está aqui */
        canvas {
            background-color: #70c5ce;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            
            /* Ajusta o canvas para caber em qualquer tela mantendo a proporção */
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; /* Garante que o jogo não estique */
        }
    </style>
</head>
<body>

<!-- O canvas continua com 800x600 internamente -->
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- CONFIGURAÇÕES E ESTADOS ---
const DIFICULDADES = {
    0: { nome: "Iniciante", velBase: 4, accel: 0.6 },
    1: { nome: "Experiente", velBase: 4.8, accel: 0.72 },
    2: { nome: "Profissional", velBase: 5.6, accel: 0.84 }
};

let dificuldadeSelecionada = 0;
let estadoJogo = "MENU";
let fps = 30;
let agora, delta, depois = Date.now();
let intervalo = 1000 / fps;

const imgs = {};
const nomesImagens = ['bg', 'base', 'pipe', 'bird1', 'bird2', 'bird3'];
let imagensCarregadas = 0;
let passaro, canos, pontos, chaoX, velocidadeAtual, incrementoAtual, teclaDireita = false;

function carregarImagens() {
    nomesImagens.forEach(nome => {
        imgs[nome] = new Image();
        imgs[nome].src = `imgs/${nome}.png`;
        imgs[nome].onload = () => {
            imagensCarregadas++;
            if (imagensCarregadas === nomesImagens.length) loop();
        };
    });
}

class Passaro {
    constructor() {
        this.x = 70;
        this.y = 300;
        this.velocidade = 0;
        this.angulo = 0;
        this.tempo = 0;
    }
    pular() {
        this.velocidade = -8;
        this.tempo = 0;
    }
    mover(estabilizado) {
        if (estabilizado) {
            this.velocidade = 0;
            this.angulo = 0;
            this.tempo = 0;
        } else {
            this.tempo++;
            let gravidade = 0.6 + (velocidadeAtual - 4) * 0.05;
            let deslocamento = gravidade * this.tempo + this.velocidade;
            if (deslocamento > 12) deslocamento = 12;
            this.y += deslocamento;
            this.angulo = deslocamento < 0 ? -25 : Math.min(this.angulo + 3, 70);
        }
    }
    desenhar() {
        ctx.save();
        ctx.translate(this.x + 20, this.y + 15);
        ctx.rotate(this.angulo * Math.PI / 180);
        ctx.drawImage(imgs.bird1, -22, -16, 45, 32);
        ctx.restore();
    }
}

class Cano {
    constructor(x) {
        this.x = x;
        this.largura = 80;
        this.distancia = 180;
        this.passou = false;
        this.alturaTopo = Math.random() * (350 - 100) + 100;
    }
    mover() { this.x -= velocidadeAtual; }
    desenhar() {
        ctx.save();
        ctx.translate(this.x + this.largura, this.alturaTopo);
        ctx.rotate(Math.PI);
        ctx.drawImage(imgs.pipe, 0, 0, this.largura, 600);
        ctx.restore();
        ctx.drawImage(imgs.pipe, this.x, this.alturaTopo + this.distancia, this.largura, 600);
    }
    colidir(p) {
        if (p.x + 30 > this.x && p.x < this.x + this.largura) {
            if (p.y < this.alturaTopo || p.y + 22 > this.alturaTopo + this.distancia) return true;
        }
        return false;
    }
}

function iniciarJogo() {
    const config = DIFICULDADES[dificuldadeSelecionada];
    velocidadeAtual = config.velBase;
    incrementoAtual = config.accel;
    passaro = new Passaro();
    canos = [new Cano(900)];
    pontos = 0;
    chaoX = 0;
    estadoJogo = "JOGANDO";
}

function desenharCenaJogo() {
    ctx.drawImage(imgs.bg, 0, 0, 800, 600);
    canos.forEach(c => c.desenhar());
    ctx.drawImage(imgs.base, chaoX, 530, 800, 70);
    ctx.drawImage(imgs.base, chaoX + 800, 530, 800, 70);
    passaro.desenhar();
    
    ctx.fillStyle = "white";
    ctx.textAlign = "left";
    ctx.font = "bold 25px Arial";
    ctx.fillText(`Pts: ${pontos} | ${DIFICULDADES[dificuldadeSelecionada].nome}`, 20, 40);
}

function desenharMenu() {
    ctx.drawImage(imgs.bg, 0, 0, 800, 600);
    ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
    ctx.fillRect(0, 0, 800, 600);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 42px Arial";
    ctx.fillText("FLAPPY BIRD ACADEMY", 400, 100);
    
    ctx.font = "22px Arial";
    ctx.fillStyle = "#FFD700";
    ctx.fillText("ESPAÇO ou TOQUE para saltar", 400, 160);

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText("ESCOLHA O NÍVEL:", 400, 260);

    for (let i = 0; i < 3; i++) {
        let sel = (dificuldadeSelecionada === i);
        ctx.fillStyle = sel ? "#4CAF50" : "#999";
        ctx.font = sel ? "bold 38px Arial" : "28px Arial";
        ctx.fillText((sel ? "● " : "") + DIFICULDADES[i].nome, 400, 320 + (i * 55));
    }

    ctx.font = "18px Arial";
    ctx.fillStyle = "#ccc";
    ctx.fillText("Use SETAS e ESC (ou toque no ícone)", 400, 530);
}

function desenharGameOver() {
    desenharCenaJogo();
    ctx.fillStyle = "rgba(150, 0, 0, 0.6)";
    ctx.fillRect(0, 0, 800, 600);
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 75px Arial";
    ctx.fillText("FIM DE JOGO", 400, 280);
    ctx.font = "35px Arial";
    ctx.fillText(`Pontuação: ${pontos}`, 400, 340);
    ctx.font = "22px Arial";
    ctx.fillStyle = "#FFD700";
    ctx.fillText("Toque ou pressione ESC para o menu", 400, 420);
}

function loop() {
    requestAnimationFrame(loop);
    agora = Date.now();
    delta = agora - depois;

    if (delta > intervalo) {
        depois = agora - (delta % intervalo);

        if (estadoJogo === "MENU") desenharMenu();
        else if (estadoJogo === "JOGANDO") {
            passaro.mover(teclaDireita);
            if (canos[canos.length - 1].x < 500) canos.push(new Cano(850));
            canos.forEach((cano, index) => {
                cano.mover();
                if (cano.colidir(passaro)) estadoJogo = "GAME_OVER";
                if (!cano.passou && passaro.x > cano.x) {
                    cano.passou = true;
                    pontos++;
                    if (pontos % 5 === 0) velocidadeAtual += incrementoAtual;
                }
                if (cano.x < -100) canos.splice(index, 1);
            });
            if (passaro.y > 530 || passaro.y < -50) estadoJogo = "GAME_OVER";
            chaoX = (chaoX - velocidadeAtual) % 800;
            desenharCenaJogo();
        } 
        else if (estadoJogo === "GAME_OVER") desenharGameOver();
    }
}

// --- CONTROLES INTELIGENTES ---

function handleInput(type) {
    if (estadoJogo === "MENU") iniciarJogo();
    else if (estadoJogo === "JOGANDO") passaro.pular();
    else if (estadoJogo === "GAME_OVER") estadoJogo = "MENU";
}

window.addEventListener("keydown", (e) => {
    if (estadoJogo === "MENU") {
        if (e.code === "ArrowDown") dificuldadeSelecionada = (dificuldadeSelecionada + 1) % 3;
        if (e.code === "ArrowUp") dificuldadeSelecionada = (dificuldadeSelecionada + 2) % 3;
        if (e.code === "Escape" || e.code === "Enter") iniciarJogo();
    } 
    else if (estadoJogo === "JOGANDO") {
        if (e.code === "Space") passaro.pular();
        if (e.code === "ArrowRight") teclaDireita = true;
        if (e.code === "Escape") estadoJogo = "MENU";
    } 
    else if (estadoJogo === "GAME_OVER") {
        if (e.code === "Escape" || e.code === "Enter" || e.code === "Space") estadoJogo = "MENU";
    }
});

window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowRight") teclaDireita = false;
});

// Toque na tela adaptado para qualquer dispositivo
window.addEventListener("touchstart", (e) => {
    e.preventDefault();
    handleInput();
}, {passive: false});

// Clique do mouse também funciona como toque
window.addEventListener("mousedown", (e) => {
    if (e.button === 0 && 'ontouchstart' in window === false) { 
        handleInput();
    }
});

carregarImagens();
</script>
</body>
</html>
