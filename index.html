<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Pro - Sistema Completo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            background-color: #70c5ce;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 600;

// --- CONFIGURAÇÕES DE DIFICULDADE ---
const DIFICULDADES = {
    0: { nome: "Iniciante", velBase: 4, accel: 0.6 },
    1: { nome: "Experiente", velBase: 4.8, accel: 0.72 },
    2: { nome: "Profissional", velBase: 5.6, accel: 0.84 }
};

let dificuldadeSelecionada = 0;
let estadoJogo = "MENU"; // "MENU", "JOGANDO" ou "GAME_OVER"

// Variáveis de tempo
let fps = 30;
let agora, delta, depois = Date.now();
let intervalo = 1000 / fps;

// Assets
const imgs = {};
const nomesImagens = ['bg', 'base', 'pipe', 'bird1', 'bird2', 'bird3'];
let imagensCarregadas = 0;
let passaro, canos, pontos, chaoX, velocidadeAtual, incrementoAtual, teclaDireita = false;

function carregarImagens() {
    nomesImagens.forEach(nome => {
        imgs[nome] = new Image();
        imgs[nome].src = `imgs/${nome}.png`;
        imgs[nome].onload = () => {
            imagensCarregadas++;
            if (imagensCarregadas === nomesImagens.length) loop();
        };
    });
}

class Passaro {
    constructor() {
        this.x = 70;
        this.y = 300;
        this.velocidade = 0;
        this.angulo = 0;
        this.tempo = 0;
    }
    pular() {
        this.velocidade = -8;
        this.tempo = 0;
    }
    // REESTABELECIDA: Função mover agora aceita o parâmetro de estabilização
    mover(estabilizado) {
        if (estabilizado) {
            this.velocidade = 0;
            this.angulo = 0;
            this.tempo = 0;
            // O pássaro fica parado no ar (estabilizado)
        } else {
            this.tempo++;
            let gravidade = 0.6 + (velocidadeAtual - 4) * 0.05;
            let deslocamento = gravidade * this.tempo + this.velocidade;
            if (deslocamento > 12) deslocamento = 12;
            this.y += deslocamento;
            this.angulo = deslocamento < 0 ? -25 : Math.min(this.angulo + 3, 70);
        }
    }
    desenhar() {
        ctx.save();
        ctx.translate(this.x + 20, this.y + 15);
        ctx.rotate(this.angulo * Math.PI / 180);
        ctx.drawImage(imgs.bird1, -22, -16, 45, 32);
        ctx.restore();
    }
}

class Cano {
    constructor(x) {
        this.x = x;
        this.largura = 80;
        this.distancia = 180;
        this.passou = false;
        this.alturaTopo = Math.random() * (350 - 100) + 100;
    }
    mover() { this.x -= velocidadeAtual; }
    desenhar() {
        ctx.save();
        ctx.translate(this.x + this.largura, this.alturaTopo);
        ctx.rotate(Math.PI);
        ctx.drawImage(imgs.pipe, 0, 0, this.largura, 600);
        ctx.restore();
        ctx.drawImage(imgs.pipe, this.x, this.alturaTopo + this.distancia, this.largura, 600);
    }
    colidir(p) {
        if (p.x + 30 > this.x && p.x < this.x + this.largura) {
            if (p.y < this.alturaTopo || p.y + 22 > this.alturaTopo + this.distancia) return true;
        }
        return false;
    }
}

function iniciarJogo() {
    const config = DIFICULDADES[dificuldadeSelecionada];
    velocidadeAtual = config.velBase;
    incrementoAtual = config.accel;
    passaro = new Passaro();
    canos = [new Cano(900)];
    pontos = 0;
    chaoX = 0;
    estadoJogo = "JOGANDO";
}

function desenharCenaJogo() {
    ctx.drawImage(imgs.bg, 0, 0, canvas.width, canvas.height);
    canos.forEach(c => c.desenhar());
    ctx.drawImage(imgs.base, chaoX, 530, canvas.width, 70);
    ctx.drawImage(imgs.base, chaoX + canvas.width, 530, canvas.width, 70);
    passaro.desenhar();
    
    ctx.fillStyle = "white";
    ctx.textAlign = "left";
    ctx.font = "bold 25px Arial";
    ctx.fillText(`Pontos: ${pontos} | Nível: ${DIFICULDADES[dificuldadeSelecionada].nome}`, 20, 40);
}

function desenharMenu() {
    ctx.drawImage(imgs.bg, 0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 45px Arial";
    ctx.fillText("PAINEL DE CONTROLE", canvas.width/2, 100);
    
    ctx.font = "20px Arial";
    ctx.fillStyle = "#FFD700";
    ctx.fillText("Instrução: Pressione ESPAÇO para saltar", canvas.width/2, 160);

    ctx.fillStyle = "white";
    ctx.font = "25px Arial";
    ctx.fillText("SELECIONE O PERFIL:", canvas.width/2, 250);

    for (let i = 0; i < 3; i++) {
        let selecionado = (dificuldadeSelecionada === i);
        ctx.fillStyle = selecionado ? "#4CAF50" : "#888";
        ctx.font = selecionado ? "bold 35px Arial" : "25px Arial";
        ctx.fillText((selecionado ? "> " : "") + DIFICULDADES[i].nome, canvas.width/2, 310 + (i * 50));
    }

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("Setas p/ escolher | ESC p/ INICIAR | SETA DIR. p/ estabilizar", canvas.width/2, 520);
}

function desenharGameOver() {
    desenharCenaJogo();
    ctx.fillStyle = "rgba(200, 0, 0, 0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 70px Arial";
    ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 20);
    
    ctx.font = "30px Arial";
    ctx.fillText(`Total de Pontos: ${pontos}`, canvas.width/2, canvas.height/2 + 40);
    
    ctx.font = "bold 20px Arial";
    ctx.fillStyle = "#FFD700";
    ctx.fillText("Pressione ESC para voltar ao Painel", canvas.width/2, canvas.height/2 + 100);
}

function loop() {
    requestAnimationFrame(loop);
    agora = Date.now();
    delta = agora - depois;

    if (delta > intervalo) {
        depois = agora - (delta % intervalo);

        if (estadoJogo === "MENU") {
            desenharMenu();
        } 
        else if (estadoJogo === "JOGANDO") {
            // PASSANDO A VARIÁVEL teclaDireita PARA O MOVIMENTO
            passaro.mover(teclaDireita);

            if (canos[canos.length - 1].x < 500) canos.push(new Cano(850));

            canos.forEach((cano, index) => {
                cano.mover();
                if (cano.colidir(passaro)) estadoJogo = "GAME_OVER";
                if (!cano.passou && passaro.x > cano.x) {
                    cano.passou = true;
                    pontos++;
                    if (pontos % 5 === 0) velocidadeAtual += incrementoAtual;
                }
                if (cano.x < -100) canos.splice(index, 1);
            });

            if (passaro.y > 530 || passaro.y < -50) estadoJogo = "GAME_OVER";
            chaoX = (chaoX - velocidadeAtual) % canvas.width;
            
            desenharCenaJogo();
        } 
        else if (estadoJogo === "GAME_OVER") {
            desenharGameOver();
        }
    }
}

// --- CONTROLES ATUALIZADOS ---

window.addEventListener("keydown", (e) => {
    if (estadoJogo === "MENU") {
        if (e.code === "ArrowDown") dificuldadeSelecionada = (dificuldadeSelecionada + 1) % 3;
        if (e.code === "ArrowUp") dificuldadeSelecionada = (dificuldadeSelecionada + 2) % 3;
        if (e.code === "Escape" || e.code === "Enter") iniciarJogo();
    } 
    else if (estadoJogo === "JOGANDO") {
        if (e.code === "Space") passaro.pular();
        if (e.code === "ArrowRight") teclaDireita = true; // ATIVA ESTABILIZAÇÃO
        if (e.code === "Escape") estadoJogo = "MENU";
    } 
    else if (estadoJogo === "GAME_OVER") {
        if (e.code === "Escape" || e.code === "Enter") {
            estadoJogo = "MENU";
        }
    }
});

window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowRight") teclaDireita = false; // DESATIVA ESTABILIZAÇÃO
});

// Suporte para Tablet (clique para avançar)
canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (estadoJogo === "MENU") iniciarJogo();
    else if (estadoJogo === "JOGANDO") passaro.pular();
    else if (estadoJogo === "GAME_OVER") estadoJogo = "MENU";
}, {passive: false});

carregarImagens();
</script>
</body>
</html>
